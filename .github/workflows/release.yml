name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile executable
        run: |
          gcc main.c icone.res -o FromJimToPam.exe

      - name: Upload executable as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FromJimToPam
          path: FromJimToPam.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v1.0.{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || format('Release v1.0.{0}', github.run_number) }}
          generate_release_notes: true
          files: FromJimToPam.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
